# Secret — пароль БД отдельно от манифеста приложения.
# stringData позволяет писать значение открытым текстом (k8s сам закодирует).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: "trainpass123"
  POSTGRES_USER: "trainuser"
  POSTGRES_DB: "traindb"
---
# Headless Service (clusterIP: None) — нужен StatefulSet'у, чтобы давать
# каждому поду стабильное DNS-имя вида postgres-0.postgres.default.svc.cluster.local.
# Обычный Service балансирует по подам; headless адресует поды поимённо.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  clusterIP: None              # это и делает Service "headless"
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
