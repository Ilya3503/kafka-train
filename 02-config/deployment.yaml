# Тот же web, но с примонтированным ConfigMap.
# Применяй ПОСЛЕ 02-config/configmap.yaml — иначе монтировать будет нечего.
# Этот файл перезапишет Deployment из 01-app (то же имя web).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            # монтируем файл из ConfigMap прямо в каталог раздачи nginx
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: content
          configMap:
            name: web-content   # имя ConfigMap из configmap.yaml
